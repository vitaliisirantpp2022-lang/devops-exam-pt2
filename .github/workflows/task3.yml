name: CI/CD Task 3 - Deploy Application

on:
  workflow_dispatch:
    inputs:
      vm_ip:
        description: 'IP-адреса ВМ'
        required: true
      environment:
        description: 'Середовище (dev або release)'
        required: true
        type: choice
        options:
          - dev
          - release
      action:
        description: 'Дія (Розгорнути або Відкотитися)'
        required: true
        type: choice
        options:
          - deploy
          - rollback

env:
  TARGET_PORT: ${{ github.event.inputs.environment == 'dev' && '8002' || '8003' }}
  IMAGE_TAG: ${{ github.event.inputs.environment == 'dev' && 'develop' || '1.0.0' }}
  NAMESPACE: ${{ github.event.inputs.environment }}
  REPO_REF: ${{ github.event.inputs.environment == 'dev' && 'develop' || 'tags/1.0.0' }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/exam-app

jobs:
  build-and-push:
    name: Build & Push Docker Image-
    if: github.event.inputs.action == 'deploy'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Target Application Repo
        uses: actions/checkout@v3
        with:
          repository: 'YulianSalo/devops-exam-pt2'
          ref: ${{ env.REPO_REF }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

  deploy-to-k8s:
    name: Deploy / Rollback on VM
    needs: build-and-push
    if: always() && (needs.build-and-push.result == 'success' || github.event.inputs.action == 'rollback')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Our Infrastructure Code
        uses: actions/checkout@v3

      - name: Copy Helm Chart to VM
        uses: appleboy/scp-action@master
        with:
          host: ${{ github.event.inputs.vm_ip }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "task3/helm"
          target: "/root"

      - name: Execute Deployment / Rollback
        uses: appleboy/ssh-action@master
        with:
          host: ${{ github.event.inputs.vm_ip }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: NAMESPACE, IMAGE_TAG, TARGET_PORT, REGISTRY, IMAGE_NAME, ACTION
          script: |
            export GITHUB_USER="${{ github.actor }}"
            export GITHUB_TOKEN="${{ secrets.GITHUB_TOKEN }}"
            
            # Створюємо неймспейс, якщо його немає
            kubectl create namespace $NAMESPACE --dry-run=client -o yaml | kubectl apply -f -
            
            # Створюємо секрет, щоб Minikube міг качати приватні образи з твого GHCR
            kubectl create secret docker-registry ghcr-secret \
              --docker-server=$REGISTRY \
              --docker-username=$GITHUB_USER \
              --docker-password=$GITHUB_TOKEN \
              --namespace=$NAMESPACE \
              --dry-run=client -o yaml | kubectl apply -f -

            if [ "$ACTION" == "rollback" ]; then
              echo "Відкочування на попередню версію..."
              helm rollback exam-app -n $NAMESPACE
            else
              echo "Попередня перевірка (Dry Run)..."
              helm upgrade --install exam-app /root/task3/helm \
                --namespace $NAMESPACE \
                --set image.tag=$IMAGE_TAG \
                --dry-run
                
              echo "Реальне розгортання..."
              helm upgrade --install exam-app /root/task3/helm \
                --namespace $NAMESPACE \
                --set image.tag=$IMAGE_TAG
            fi
            
            # Виконуємо вимогу екзамену: Port-Forward у фоновому режимі
            echo "Налаштування Port-Forwarding на порт $TARGET_PORT..."
            # Вбиваємо старий процес port-forward для цього порту, якщо він був
            fuser -k ${TARGET_PORT}/tcp || true
            nohup kubectl port-forward svc/exam-app-service ${TARGET_PORT}:80 -n $NAMESPACE --address 0.0.0.0 > /dev/null 2>&1 &
            
            echo "Готово! Застосунок доступний на http://${{ github.event.inputs.vm_ip }}:${TARGET_PORT}"
